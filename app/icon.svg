<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a"/>
      <stop offset="100%" style="stop-color:#116a48"/>
    </linearGradient>
  </defs>
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <g transform="translate(256,256)">
    <!-- Soccer ball -->
    <circle r="140" fill="white" stroke="#1e293b" stroke-width="4"/>
    <!-- Pentagon center -->
    <polygon points="0,-48 45.6,-14.8 28.2,38.8 -28.2,38.8 -45.6,-14.8" fill="#1e293b"/>
    <!-- Top pentagon -->
    <polygon points="0,-140 30,-100 -30,-100" fill="#1e293b"/>
    <polygon points="0,-140 30,-100 50,-120" fill="#1e293b"/>
    <polygon points="0,-140 -30,-100 -50,-120" fill="#1e293b"/>
    <!-- Connecting lines -->
    <line x1="0" y1="-48" x2="0" y2="-100" stroke="#1e293b" stroke-width="5"/>
    <line x1="45.6" y1="-14.8" x2="85" y2="-55" stroke="#1e293b" stroke-width="5"/>
    <line x1="28.2" y1="38.8" x2="55" y2="90" stroke="#1e293b" stroke-width="5"/>
    <line x1="-28.2" y1="38.8" x2="-55" y2="90" stroke="#1e293b" stroke-width="5"/>
    <line x1="-45.6" y1="-14.8" x2="-85" y2="-55" stroke="#1e293b" stroke-width="5"/>
    <!-- Outer pentagons -->
    <polygon points="85,-55 130,-35 120,-80 85,-105 55,-85" fill="#1e293b"/>
    <polygon points="-85,-55 -130,-35 -120,-80 -85,-105 -55,-85" fill="#1e293b"/>
    <polygon points="55,90 105,105 120,65 95,35 50,50" fill="#1e293b"/>
    <polygon points="-55,90 -105,105 -120,65 -95,35 -50,50" fill="#1e293b"/>
    <polygon points="0,140 35,115 -35,115" fill="#1e293b"/>
  </g>
</svg>
